name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        default: backend
        type: choice
        options:
          - backend
          - frontend
          - all

permissions:
  contents: read

concurrency:
  group: bestcode-production-deploy
  cancel-in-progress: false

jobs:
  backend:
    name: Deploy backend Worker
    if: ${{ inputs.target == 'all' || inputs.target == 'backend' }}
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: backend
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Verify Cloudflare deployment secrets
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "CLOUDFLARE_API_TOKEN is missing" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "CLOUDFLARE_ACCOUNT_ID is missing" && exit 1)
      - name: Typecheck backend
        run: npm run typecheck
      - name: Deploy backend
        run: npx wrangler deploy

  frontend:
    name: Build and deploy PWA
    if: ${{ inputs.target == 'all' || inputs.target == 'frontend' }}
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: frontend
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - name: Verify Cloudflare deployment secrets
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "CLOUDFLARE_API_TOKEN is missing" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "CLOUDFLARE_ACCOUNT_ID is missing" && exit 1)
      - name: Deploy frontend
        run: npx wrangler@3.99.0 deploy
