name: R2 Binary Contract

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'backend/src/assetBinaryApi.ts'
      - 'backend/src/assetBinaryApi.test.mjs'
      - 'backend/src/assetStorage.ts'
      - 'backend/src/r2AssetStore.ts'
      - 'backend/src/r2AssetStore.integration.test.mjs'
      - 'backend/src/security.ts'
      - 'backend/src/security.test.mjs'
      - 'backend/src/index.ts'
      - 'backend/src/types.ts'
      - 'backend/wrangler.toml'
      - '.github/workflows/r2-binary-contract.yml'

permissions:
  contents: read

jobs:
  contract:
    name: Secure binary lifecycle tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Run focused R2 binary contract
        shell: bash
        run: |
          set -o pipefail
          node --import tsx --test src/assetBinaryApi.test.mjs src/r2AssetStore.integration.test.mjs src/security.test.mjs 2>&1 | tee r2-binary-tests.log
      - name: Upload R2 binary test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r2-binary-tests-${{ github.run_id }}-${{ github.run_attempt }}
          path: backend/r2-binary-tests.log
          if-no-files-found: warn
          retention-days: 30
