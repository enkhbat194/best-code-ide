name: Production Build Delivery

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bestcode-production-delivery
  cancel-in-progress: false

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  BESTCODE_PRODUCTION_WORKERS: >-
    [{"name":"best-code-ide","root_directory":"backend"},{"name":"best-code-ide-appl","root_directory":"frontend"}]

jobs:
  deliver:
    name: Trigger and verify exact main production builds
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Test production delivery safety contract
        run: node --test scripts/cloudflare-production-build-controller.test.mjs scripts/cloudflare-release-integrity.test.mjs
      - name: Trigger exact Cloudflare production builds and wait for activation
        run: >-
          node scripts/cloudflare-production-build-controller.mjs
          --repository "$GITHUB_REPOSITORY"
          --branch main
          --expected-sha "$GITHUB_SHA"
          --wait-seconds 900
          --poll-seconds 10
          --output artifacts/production-delivery.json
      - name: Upload immutable production delivery evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-delivery-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/production-delivery.json
          if-no-files-found: warn
          retention-days: 30
