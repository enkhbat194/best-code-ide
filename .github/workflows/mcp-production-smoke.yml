name: Subscription MCP Production Smoke

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend/src/actions.ts'
      - 'backend/src/authentication.ts'
      - 'backend/src/index.ts'
      - 'backend/src/mcp.ts'
      - 'backend/src/openapi.ts'
      - 'backend/src/securityAuditStore.ts'
      - 'backend/src/subscriptionCredentialApi.ts'
      - 'backend/src/subscriptionCredentials.ts'
      - 'backend/src/subscriptionCredentialTypes.ts'
      - 'backend/src/subscriptionTools.ts'
      - 'backend/src/toolGateway.ts'
      - 'backend/src/mcpReadTools.ts'
      - 'backend/src/mcpWriteTools.ts'
      - 'backend/src/mcpDeploymentTools.ts'
      - 'backend/src/missionTools.ts'
      - 'backend/src/projectBrainTools.ts'
      - 'scripts/mcp-production-smoke.mjs'
      - 'scripts/mcp-production-smoke.test.mjs'
      - 'scripts/cloudflare-release-integrity.mjs'
      - '.github/workflows/mcp-production-smoke.yml'

permissions:
  contents: read

concurrency:
  group: bestcode-subscription-mcp-production-smoke
  cancel-in-progress: false

jobs:
  smoke:
    name: Verify subscription MCP production closeout
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      BESTCODE_AUTH_TOKEN: ${{ secrets.BESTCODE_AUTH_TOKEN || secrets.AUTH_TOKEN }}
      BESTCODE_BACKEND_URL: https://best-code-ide.enkhbat194.workers.dev
      BESTCODE_PRODUCTION_WORKERS: >-
        [{"name":"best-code-ide","root_directory":"backend"},{"name":"best-code-ide-appl","root_directory":"frontend"}]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Test MCP smoke controller
        run: node --test scripts/mcp-production-smoke.test.mjs
      - name: Require production secrets
        shell: bash
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "::error::CLOUDFLARE_API_TOKEN is missing" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "::error::CLOUDFLARE_ACCOUNT_ID is missing" && exit 1)
          test -n "$BESTCODE_AUTH_TOKEN" || (echo "::error::BESTCODE_AUTH_TOKEN or AUTH_TOKEN is missing" && exit 1)
      - name: Wait for exact main deployment and 100 percent traffic
        run: >-
          node scripts/cloudflare-release-integrity.mjs
          --repository "$GITHUB_REPOSITORY"
          --branch main
          --expected-sha "$GITHUB_SHA"
          --repair-preview-triggers false
          --wait-seconds 900
          --poll-seconds 20
          --output artifacts/mcp-smoke-release-integrity.json
      - name: Run authenticated read-only subscription MCP smoke
        run: >-
          node scripts/mcp-production-smoke.mjs
          --backend-url "$BESTCODE_BACKEND_URL"
          --expected-sha "$GITHUB_SHA"
          --output artifacts/mcp-production-smoke.json
      - name: Upload immutable closeout evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: subscription-mcp-production-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            artifacts/mcp-smoke-release-integrity.json
            artifacts/mcp-production-smoke.json
          if-no-files-found: warn
          retention-days: 30
