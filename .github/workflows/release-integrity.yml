name: Release Integrity

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'agent/source-lock-probe-*'
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: read

concurrency:
  group: bestcode-release-integrity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  production-source-lock:
    name: Verify active production source
    if: ${{ github.event_name != 'push' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      BESTCODE_PRODUCTION_WORKERS: >-
        [{"name":"best-code-ide","root_directory":"backend"},{"name":"best-code-ide-appl","root_directory":"frontend"}]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Test source-lock policy
        run: node --test scripts/cloudflare-release-integrity.test.mjs
      - name: Audit Cloudflare triggers and active versions
        run: >-
          node scripts/cloudflare-release-integrity.mjs
          --repository "$GITHUB_REPOSITORY"
          --branch main
          --expected-sha "$GITHUB_SHA"
          --repair-preview-triggers true
          --wait-seconds 900
          --poll-seconds 20
          --output artifacts/release-integrity.json
      - name: Upload immutable release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-integrity-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/release-integrity.json
          if-no-files-found: warn
          retention-days: 30

  non-main-isolation:
    name: Prove non-main stays preview-only
    if: ${{ startsWith(github.ref, 'refs/heads/agent/source-lock-probe-') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      BESTCODE_PRODUCTION_WORKERS: >-
        [{"name":"best-code-ide","root_directory":"backend"},{"name":"best-code-ide-appl","root_directory":"frontend"}]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Test source-lock policy
        run: node --test scripts/cloudflare-release-integrity.test.mjs
      - name: Resolve current main SHA
        id: main
        run: |
          git fetch --no-tags --depth=1 origin main
          echo "sha=$(git rev-parse FETCH_HEAD)" >> "$GITHUB_OUTPUT"
      - name: Prove preview build did not change production traffic
        run: >-
          node scripts/cloudflare-release-integrity.mjs
          --repository "$GITHUB_REPOSITORY"
          --branch main
          --expected-sha "${{ steps.main.outputs.sha }}"
          --expected-preview-branch "$GITHUB_REF_NAME"
          --expected-preview-sha "$GITHUB_SHA"
          --repair-preview-triggers false
          --wait-seconds 900
          --poll-seconds 20
          --output artifacts/source-isolation.json
      - name: Upload immutable isolation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-isolation-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/source-isolation.json
          if-no-files-found: warn
          retention-days: 30
