name: Validate

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - 'agent/**'

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend build and lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend:
    name: Backend typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Typecheck
        shell: bash
        run: bash ../scripts/run-backend-typecheck-with-log.sh
      - name: Upload typecheck log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-typecheck-log
          path: backend/typecheck.log
          if-no-files-found: ignore
