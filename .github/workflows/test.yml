name: Test

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches:
      - 'agent/**'

permissions:
  contents: read

jobs:
  release-policy-tests:
    name: Production source-lock tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node --test scripts/cloudflare-release-integrity.test.mjs

  backend-tests:
    name: Backend unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm test
