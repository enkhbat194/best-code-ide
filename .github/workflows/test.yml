name: Test

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches:
      - 'agent/**'

permissions:
  contents: read

jobs:
  release-policy-tests:
    name: Production source-lock tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node --test scripts/cloudflare-release-integrity.test.mjs scripts/cloudflare-production-build-controller.test.mjs scripts/r2-production-smoke.test.mjs scripts/mcp-production-smoke.test.mjs scripts/scoped-subscription-auth-smoke.test.mjs

  backend-tests:
    name: Backend typecheck and unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Run backend typecheck
        run: npm run typecheck
      - name: Run backend tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee backend-tests.log
      - name: Upload backend test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-tests-${{ github.run_id }}-${{ github.run_attempt }}
          path: backend/backend-tests.log
          if-no-files-found: warn
          retention-days: 30

  frontend-validation:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
