name: Test

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches:
      - 'agent/**'

permissions:
  contents: read

jobs:
  release-policy-tests:
    name: Production source-lock tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node --test scripts/cloudflare-release-integrity.test.mjs scripts/cloudflare-production-build-controller.test.mjs scripts/r2-production-smoke.test.mjs scripts/mcp-production-smoke.test.mjs

  backend-tests:
    name: Backend unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Run backend tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee backend-tests.log
      - name: Upload backend test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-tests-${{ github.run_id }}-${{ github.run_attempt }}
          path: backend/backend-tests.log
          if-no-files-found: warn
          retention-days: 30

  observe-production-closeout:
    if: github.event_name == 'pull_request'
    name: Observe exact-SHA MCP production evidence
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Read public workflow, jobs, and artifact metadata
        env:
          EXPECTED_SHA: 675ebb0d3a4df7627248f62d2b459c93ea1a4437
          REPOSITORY: enkhbat194/best-code-ide
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { mkdir, writeFile } from 'node:fs/promises'

          const api = 'https://api.github.com'
          const repository = process.env.REPOSITORY
          const expectedSha = process.env.EXPECTED_SHA
          const headers = { Accept: 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28' }
          const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms))
          const get = async (path) => {
            const response = await fetch(`${api}${path}`, { headers })
            if (!response.ok) throw new Error(`GitHub public API ${response.status}: ${await response.text()}`)
            return response.json()
          }

          const deadline = Date.now() + 25 * 60 * 1000
          let run = null
          while (Date.now() < deadline) {
            const data = await get(`/repos/${repository}/actions/workflows/mcp-production-smoke.yml/runs?branch=main&event=push&per_page=10`)
            run = (data.workflow_runs ?? []).find((item) => item.head_sha === expectedSha) ?? null
            if (run?.status === 'completed') break
            await sleep(30_000)
          }
          if (!run) throw new Error(`No Subscription MCP Production Smoke run found for ${expectedSha}`)

          const jobs = await get(`/repos/${repository}/actions/runs/${run.id}/jobs?per_page=100`)
          const artifacts = await get(`/repos/${repository}/actions/runs/${run.id}/artifacts?per_page=100`)
          const evidenceArtifact = (artifacts.artifacts ?? []).find((item) => item.name.startsWith('subscription-mcp-production-smoke-')) ?? null
          const evidence = {
            workflow_run: {
              id: run.id,
              name: run.name,
              event: run.event,
              status: run.status,
              conclusion: run.conclusion,
              head_branch: run.head_branch,
              head_sha: run.head_sha,
              run_number: run.run_number,
              run_attempt: run.run_attempt,
              created_at: run.created_at,
              updated_at: run.updated_at,
              html_url: run.html_url,
            },
            jobs: (jobs.jobs ?? []).map((job) => ({
              id: job.id,
              name: job.name,
              status: job.status,
              conclusion: job.conclusion,
              steps: (job.steps ?? []).map((step) => ({ name: step.name, status: step.status, conclusion: step.conclusion })),
            })),
            artifact: evidenceArtifact ? {
              id: evidenceArtifact.id,
              name: evidenceArtifact.name,
              size_in_bytes: evidenceArtifact.size_in_bytes,
              expired: evidenceArtifact.expired,
              created_at: evidenceArtifact.created_at,
              digest: evidenceArtifact.digest ?? null,
            } : null,
          }
          await mkdir('artifacts', { recursive: true })
          await writeFile('artifacts/mcp-production-observer.json', `${JSON.stringify(evidence, null, 2)}\n`, { mode: 0o600 })
          console.log(`MCP_PRODUCTION_CLOSEOUT_EVIDENCE=${JSON.stringify(evidence)}`)
          if (run.status !== 'completed' || run.conclusion !== 'success') throw new Error(`Production smoke conclusion: ${run.conclusion ?? run.status}`)
          if (!evidenceArtifact || evidenceArtifact.expired) throw new Error('Immutable production smoke artifact is missing or expired')
          if ((jobs.jobs ?? []).some((job) => job.conclusion !== 'success')) throw new Error('One or more production smoke jobs did not succeed')
          NODE
      - name: Upload temporary observer evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-production-observer-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/mcp-production-observer.json
          if-no-files-found: error
          retention-days: 1
