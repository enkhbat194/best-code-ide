name: OpenAI Subscription MCP Production Smoke

on:
  workflow_dispatch:
    inputs:
      confirm_live_credential:
        description: Type CREATE-OPENAI-AND-REVOKE to approve one short-lived production OpenAI credential lifecycle
        required: true
        type: string
  push:
    branches:
      - main
    paths:
      - .github/triggers/openai-subscription-mcp-smoke.txt

permissions:
  contents: read

concurrency:
  group: bestcode-openai-subscription-mcp-production-smoke
  cancel-in-progress: false

jobs:
  smoke:
    if: ${{ github.event_name == 'push' || inputs.confirm_live_credential == 'CREATE-OPENAI-AND-REVOKE' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    permissions:
      contents: read
      statuses: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      BESTCODE_AUTH_TOKEN: ${{ secrets.BESTCODE_AUTH_TOKEN || secrets.AUTH_TOKEN }}
      BESTCODE_BACKEND_URL: https://best-code-ide.enkhbat194.workers.dev
      BESTCODE_PRODUCTION_WORKERS: >-
        [{"name":"best-code-ide","root_directory":"backend"},{"name":"best-code-ide-appl","root_directory":"frontend"}]
    steps:
      - name: Publish pending smoke status
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          payload="$(jq -nc \
            --arg state pending \
            --arg target_url "$RUN_URL" \
            --arg description "OpenAI MCP production smoke running" \
            --arg context "openai-subscription-mcp-production-smoke" \
            '{state:$state,target_url:$target_url,description:$description,context:$context}')"
          curl --fail-with-body -sS -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -d "$payload"
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Test OpenAI-compatible smoke controller
        run: node --test scripts/scoped-subscription-auth-smoke.test.mjs scripts/cloudflare-release-integrity-retry.test.mjs
      - name: Require protected production secrets
        shell: bash
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "::error::CLOUDFLARE_API_TOKEN is missing" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "::error::CLOUDFLARE_ACCOUNT_ID is missing" && exit 1)
          test -n "$BESTCODE_AUTH_TOKEN" || (echo "::error::BESTCODE_AUTH_TOKEN or AUTH_TOKEN is missing" && exit 1)
      - name: Require exact main deployment and 100 percent traffic
        run: >-
          node scripts/cloudflare-release-integrity-retry.mjs
          --max-wait-seconds 900
          --retry-poll-seconds 20
          --
          --repository "$GITHUB_REPOSITORY"
          --branch main
          --expected-sha "$GITHUB_SHA"
          --repair-preview-triggers false
          --wait-seconds 0
          --poll-seconds 5
          --output artifacts/openai-mcp-release-integrity.json
      - name: Create, verify, and revoke OpenAI scoped credential
        run: >-
          node scripts/scoped-subscription-auth-smoke.mjs
          --backend-url "$BESTCODE_BACKEND_URL"
          --project-id bestcode
          --agent-name github-actions-openai-mcp-smoke
          --provider openai
          --openai-reads true
          --schema-version bestcode-openai-subscription-mcp-smoke-v1
          --output artifacts/openai-subscription-mcp-smoke.json
      - name: Scan redacted evidence for scoped credential leaks
        shell: bash
        run: |
          if grep -R -E 'bcsub_v1\.[a-f0-9-]{36}\.[A-Za-z0-9_-]{32,128}' artifacts; then
            echo "::error::Scoped credential leaked into artifact"
            exit 1
          fi
      - name: Upload redacted immutable evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openai-subscription-mcp-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            artifacts/openai-mcp-release-integrity.json
            artifacts/openai-subscription-mcp-smoke.json
          if-no-files-found: warn
          retention-days: 30

  report:
    name: Publish final smoke status
    if: always()
    needs: smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Publish final smoke status
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RESULT: ${{ needs.smoke.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          case "$RESULT" in
            success)
              state=success
              description="OpenAI MCP production smoke passed"
              ;;
            failure)
              state=failure
              description="OpenAI MCP production smoke failed"
              ;;
            cancelled)
              state=error
              description="OpenAI MCP production smoke cancelled"
              ;;
            *)
              state=error
              description="OpenAI MCP production smoke did not run"
              ;;
          esac
          payload="$(jq -nc \
            --arg state "$state" \
            --arg target_url "$RUN_URL" \
            --arg description "$description" \
            --arg context "openai-subscription-mcp-production-smoke" \
            '{state:$state,target_url:$target_url,description:$description,context:$context}')"
          curl --fail-with-body -sS -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
            -d "$payload"
