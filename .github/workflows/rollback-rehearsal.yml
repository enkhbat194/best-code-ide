name: Rollback Rehearsal

on:
  push:
    branches:
      - main
      - agent/rollback-rehearsal-approved-20260719-1
  workflow_dispatch:
    inputs:
      mode:
        description: Plan only, or briefly activate an exact previous-good version and restore current main
        required: true
        default: plan
        type: choice
        options:
          - plan
          - rehearse
      worker:
        description: Worker used by rehearse mode (plan mode audits both)
        required: true
        default: best-code-ide
        type: choice
        options:
          - best-code-ide
          - best-code-ide-appl
      target_version_id:
        description: Exact candidate version ID copied from the latest plan artifact
        required: false
        type: string
      target_commit_sha:
        description: Exact candidate commit SHA copied from the latest plan artifact
        required: false
        type: string
      confirmation:
        description: Type REHEARSE_ROLLBACK after owner approval
        required: false
        type: string

permissions:
  actions: read
  contents: read
  statuses: write

concurrency:
  group: bestcode-rollback-${{ github.event.inputs.worker || github.ref }}
  cancel-in-progress: false

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  GITHUB_TOKEN: ${{ github.token }}
  BESTCODE_ROLLBACK_WORKERS: >-
    [{"name":"best-code-ide","root_directory":"backend","smoke_url":"https://best-code-ide.enkhbat194.workers.dev/health","smoke_kind":"json_health"},{"name":"best-code-ide-appl","root_directory":"frontend","smoke_url":"https://best-code-ide-appl.enkhbat194.workers.dev/","smoke_kind":"html"}]

jobs:
  plan:
    name: Plan ${{ matrix.worker }} rollback
    if: ${{ github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'plan') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    strategy:
      fail-fast: false
      matrix:
        worker:
          - best-code-ide
          - best-code-ide-appl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Test rollback safety contract
        run: node --test scripts/cloudflare-release-integrity.test.mjs scripts/cloudflare-rollback-controller.test.mjs
      - name: Resolve exact current and previous-good versions
        env:
          PLAN_WORKER: ${{ matrix.worker }}
        run: >-
          node scripts/cloudflare-rollback-controller.mjs
          --mode plan
          --worker "$PLAN_WORKER"
          --repository "$GITHUB_REPOSITORY"
          --expected-main-sha "$GITHUB_SHA"
          --wait-seconds 900
          --poll-seconds 20
          --output "artifacts/rollback-plan-$PLAN_WORKER.json"
      - name: Upload immutable rollback plan
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rollback-plan-${{ matrix.worker }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/rollback-plan-${{ matrix.worker }}.json
          if-no-files-found: warn
          retention-days: 30

  rehearse:
    name: Rehearse exact rollback and restore
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'rehearse' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Test rollback safety contract
        run: node --test scripts/cloudflare-release-integrity.test.mjs scripts/cloudflare-rollback-controller.test.mjs
      - name: Activate exact previous-good version, smoke, and restore current main
        env:
          REHEARSAL_WORKER: ${{ github.event.inputs.worker }}
          TARGET_VERSION_ID: ${{ github.event.inputs.target_version_id }}
          TARGET_COMMIT_SHA: ${{ github.event.inputs.target_commit_sha }}
          REHEARSAL_CONFIRMATION: ${{ github.event.inputs.confirmation }}
        run: >-
          node scripts/cloudflare-rollback-controller.mjs
          --mode rehearse
          --worker "$REHEARSAL_WORKER"
          --repository "$GITHUB_REPOSITORY"
          --expected-main-sha "$GITHUB_SHA"
          --target-version-id "$TARGET_VERSION_ID"
          --target-commit-sha "$TARGET_COMMIT_SHA"
          --confirmation "$REHEARSAL_CONFIRMATION"
          --wait-seconds 0
          --poll-seconds 20
          --output "artifacts/rollback-rehearsal-$REHEARSAL_WORKER.json"
      - name: Upload immutable rehearsal evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rollback-rehearsal-${{ github.event.inputs.worker }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/rollback-rehearsal-${{ github.event.inputs.worker }}.json
          if-no-files-found: warn
          retention-days: 30

  approved-rehearsal:
    name: Run owner-approved backend and PWA rehearsal
    if: ${{ github.ref == 'refs/heads/agent/rollback-rehearsal-approved-20260719-1' && github.event.head_commit.message != 'Publish previous rollback rehearsal outcome' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Test rollback safety contract
        run: node --test scripts/cloudflare-release-integrity.test.mjs scripts/cloudflare-rollback-controller.test.mjs
      - name: Rehearse backend rollback and restore
        run: >-
          node scripts/cloudflare-rollback-controller.mjs
          --mode rehearse
          --worker best-code-ide
          --repository "$GITHUB_REPOSITORY"
          --expected-main-sha 86cd1cb884b65f05c1557b4553a251169f454dd3
          --target-version-id c1adc845-1015-4d25-b77a-5803788853b8
          --target-commit-sha bf76487c8ed7e3bfad8cd6131a5d16587af65c8a
          --confirmation REHEARSE_ROLLBACK
          --wait-seconds 0
          --poll-seconds 20
          --output artifacts/rollback-rehearsal-best-code-ide.json
      - name: Rehearse installed PWA rollback and restore
        run: >-
          node scripts/cloudflare-rollback-controller.mjs
          --mode rehearse
          --worker best-code-ide-appl
          --repository "$GITHUB_REPOSITORY"
          --expected-main-sha 86cd1cb884b65f05c1557b4553a251169f454dd3
          --target-version-id 9a6874a0-0080-4533-a68a-8f34145e88d9
          --target-commit-sha bf76487c8ed7e3bfad8cd6131a5d16587af65c8a
          --confirmation REHEARSE_ROLLBACK
          --wait-seconds 0
          --poll-seconds 20
          --output artifacts/rollback-rehearsal-best-code-ide-appl.json
      - name: Upload immutable owner-approved rehearsal evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rollback-rehearsal-approved-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/rollback-rehearsal-*.json
          if-no-files-found: warn
          retention-days: 30

  publish-rehearsal-status:
    name: Publish previous rollback rehearsal outcome
    if: ${{ github.ref == 'refs/heads/agent/rollback-rehearsal-approved-20260719-1' && github.event.head_commit.message == 'Publish previous rollback rehearsal outcome' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Publish exact previous rehearsal run as a commit status
        env:
          EXPECTED_REHEARSAL_SHA: 103f73efb0a1e88ec259db19425c02dd5a2b3a68
        run: node scripts/github-workflow-status-bridge.mjs
