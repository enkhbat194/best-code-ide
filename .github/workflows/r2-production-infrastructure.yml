name: R2 Production Infrastructure

on:
  workflow_dispatch:
  push:
    branches:
      - 'agent/r2-production-infrastructure'
    paths:
      - '.github/workflows/r2-production-infrastructure.yml'
      - 'scripts/cloudflare-r2-production-infrastructure.mjs'
      - 'scripts/cloudflare-r2-production-infrastructure.test.mjs'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/r2-production-infrastructure.yml'
      - 'scripts/cloudflare-r2-production-infrastructure.mjs'
      - 'scripts/cloudflare-r2-production-infrastructure.test.mjs'

permissions:
  contents: read

concurrency:
  group: bestcode-r2-production-infrastructure
  cancel-in-progress: false

jobs:
  provision:
    name: Disable backend previews and ensure R2 bucket
    if: ${{ github.repository == 'enkhbat194/best-code-ide' && (github.event_name != 'pull_request' || github.head_ref == 'agent/r2-production-infrastructure') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      BESTCODE_PRODUCTION_WORKERS: >-
        [{"name":"best-code-ide","root_directory":"backend"},{"name":"best-code-ide-appl","root_directory":"frontend"}]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Test infrastructure controller
        run: node --test scripts/cloudflare-r2-production-infrastructure.test.mjs
      - name: Resolve current main SHA
        id: main
        run: |
          git fetch --no-tags --depth=1 origin main
          echo "sha=$(git rev-parse FETCH_HEAD)" >> "$GITHUB_OUTPUT"
      - name: Apply approved R2 production infrastructure
        id: apply
        continue-on-error: true
        run: >-
          node scripts/cloudflare-r2-production-infrastructure.mjs
          --production-branch main
          --worker-name best-code-ide
          --bucket-name best-code-ide-assets-prod
          --output artifacts/r2-production-infrastructure.json
      - name: Audit current production trigger and source state
        if: always()
        continue-on-error: true
        run: >-
          node scripts/cloudflare-release-integrity.mjs
          --repository "$GITHUB_REPOSITORY"
          --branch main
          --expected-sha "${{ steps.main.outputs.sha }}"
          --repair-preview-triggers false
          --wait-seconds 0
          --poll-seconds 20
          --output artifacts/r2-infrastructure-source-lock.json
      - name: Upload immutable infrastructure evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r2-production-infrastructure-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            artifacts/r2-production-infrastructure.json
            artifacts/r2-infrastructure-source-lock.json
          if-no-files-found: warn
          retention-days: 30
      - name: Enforce infrastructure result
        if: ${{ always() && steps.apply.outcome != 'success' }}
        run: exit 1
