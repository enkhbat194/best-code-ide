name: R2 Production Infrastructure

on:
  workflow_dispatch:
  push:
    branches:
      - 'agent/r2-production-infrastructure'
    paths:
      - '.github/workflows/r2-production-infrastructure.yml'
      - 'scripts/cloudflare-r2-production-infrastructure.mjs'
      - 'scripts/cloudflare-r2-production-infrastructure.test.mjs'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/r2-production-infrastructure.yml'
      - 'scripts/cloudflare-r2-production-infrastructure.mjs'
      - 'scripts/cloudflare-r2-production-infrastructure.test.mjs'

permissions:
  contents: read

concurrency:
  group: bestcode-r2-production-infrastructure
  cancel-in-progress: false

jobs:
  provision:
    name: Disable backend previews and ensure R2 bucket
    if: ${{ github.repository == 'enkhbat194/best-code-ide' && (github.event_name != 'pull_request' || github.head_ref == 'agent/r2-production-infrastructure') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Test infrastructure controller
        run: node --test scripts/cloudflare-r2-production-infrastructure.test.mjs
      - name: Apply approved R2 production infrastructure
        run: >-
          node scripts/cloudflare-r2-production-infrastructure.mjs
          --production-branch main
          --worker-name best-code-ide
          --bucket-name best-code-ide-assets-prod
          --output artifacts/r2-production-infrastructure.json
      - name: Upload immutable infrastructure evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r2-production-infrastructure-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/r2-production-infrastructure.json
          if-no-files-found: warn
          retention-days: 30
