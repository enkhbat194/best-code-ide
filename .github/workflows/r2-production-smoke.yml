name: R2 Production Smoke

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend/src/assetBinaryApi.ts'
      - 'backend/src/assetSchema.ts'
      - 'backend/src/assetStorage.ts'
      - 'backend/src/r2AssetStore.ts'
      - 'backend/src/index.ts'
      - 'backend/src/types.ts'
      - 'backend/wrangler.toml'
      - 'scripts/r2-production-smoke.mjs'
      - 'scripts/r2-production-smoke.test.mjs'
      - '.github/workflows/r2-production-smoke.yml'

permissions:
  contents: read

concurrency:
  group: bestcode-r2-production-smoke
  cancel-in-progress: false

jobs:
  smoke:
    name: Verify private R2 production lifecycle
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      BESTCODE_AUTH_TOKEN: ${{ secrets.BESTCODE_AUTH_TOKEN || secrets.AUTH_TOKEN }}
      BESTCODE_BACKEND_URL: https://best-code-ide.enkhbat194.workers.dev
      BESTCODE_PRODUCTION_WORKERS: >-
        [{"name":"best-code-ide","root_directory":"backend"},{"name":"best-code-ide-appl","root_directory":"frontend"}]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Test smoke controller
        run: node --test scripts/r2-production-smoke.test.mjs
      - name: Require production authentication secret
        shell: bash
        run: |
          if [[ -z "$BESTCODE_AUTH_TOKEN" ]]; then
            echo "::error::Add BESTCODE_AUTH_TOKEN or AUTH_TOKEN to the GitHub production environment before production smoke."
            exit 1
          fi
      - name: Wait for exact main deployment
        run: >-
          node scripts/cloudflare-release-integrity.mjs
          --repository "$GITHUB_REPOSITORY"
          --branch main
          --expected-sha "$GITHUB_SHA"
          --repair-preview-triggers false
          --wait-seconds 900
          --poll-seconds 20
          --output artifacts/r2-smoke-release-integrity.json
      - name: Run authenticated upload, download, duplicate, and delete smoke
        run: >-
          node scripts/r2-production-smoke.mjs
          --backend-url "$BESTCODE_BACKEND_URL"
          --run-key "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          --output artifacts/r2-production-smoke.json
      - name: Upload immutable smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r2-production-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            artifacts/r2-smoke-release-integrity.json
            artifacts/r2-production-smoke.json
          if-no-files-found: warn
          retention-days: 30
